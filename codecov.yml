# Codecov Configuration
codecov:
  require_ci_to_pass: true
  precision: 2
  round: down

coverage:
  precision: 2
  round: down
  range:
    - 15
    - 100
  status:
    project:
      default:
        target: 15
        threshold: 2%
        flags:
          - unittests

ignore:
  - "tests"
  - "**/*_test.go"
  - "**/mocks"
  - "cmd/"
  - "internal/handlers"
  - "internal/repositories"
  - "internal/models"
  - "internal/middleware"
  - "internal/config"
  - "internal/database"
  - "internal/utils"
  - "pkg/"

comment:
  layout: reach,diff,files
  require_changes: false
  require_base: false
  require_head: true
  behavior: default

flags:
  unittests:
    carryforward: true
    paths:
      - internal/

parsers:
  gcov:
    branch_detection:
      conditional: yes
      loop: yes
      method: no
      macro: no
