        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_coolmate_ecommerce-backend_internal_utils.APIResponse'
      summary: Login
      tags:
      - Auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Revokes the provided refresh token.
      parameters:
      - description: '{ refreshToken }'
        in: body
        name: body
        required: true
        schema:
          additionalProperties:
            type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
