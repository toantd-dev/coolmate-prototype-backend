basePath: /api/v1
definitions:
  github_com_coolmate_ecommerce-backend_internal_services.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  github_com_coolmate_ecommerce-backend_internal_services.RegisterRequest:
    properties:
      email:
        type: string
      firstName:
        type: string
      lastName:
        type: string
      password:
        minLength: 8
        type: string
      phone:
        type: string
    required:
    - email
    - password
    type: object
  github_com_coolmate_ecommerce-backend_internal_utils.APIResponse:
    properties:
      data: {}
      errors: {}
      message:
        type: string
      success:
        type: boolean
    type: object
host: localhost:8080
info:
  contact:
    email: dev@coolmate.local
    name: Coolmate Team
  description: Go + Gin backend for a multivendor eCommerce platform. Auth, vendor
    onboarding (KYC), product catalog, order splitting, commission, settlement.
  license:
    name: MIT
  termsOfService: https://example.com/terms
  title: Coolmate Multivendor eCommerce API
  version: "0.1"
paths:
  /admin/orders:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_coolmate_ecommerce-backend_internal_utils.APIResponse'
      security:
      - BearerAuth: []
      summary: List all orders (STUB, admin)
      tags:
      - Orders (Admin)
  /admin/products/{id}/approve:
    post:
      parameters:
      - description: Product ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_coolmate_ecommerce-backend_internal_utils.APIResponse'
      security:
      - BearerAuth: []
      summary: Approve product (STUB)
      tags:
      - Products (Admin)
  /admin/products/{id}/reject:
    post:
      parameters:
      - description: Product ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
