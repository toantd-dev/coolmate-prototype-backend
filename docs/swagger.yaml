            $ref: '#/definitions/github_com_coolmate_ecommerce-backend_internal_utils.APIResponse'
      security:
      - BearerAuth: []
      summary: Reject product (STUB)
      tags:
      - Products (Admin)
  /admin/products/pending-approval:
