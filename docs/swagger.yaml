  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user and returns access + refresh tokens.
      parameters:
      - description: Login payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_coolmate_ecommerce-backend_internal_services.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
