            $ref: '#/definitions/github_com_coolmate_ecommerce-backend_internal_utils.APIResponse'
      security:
      - BearerAuth: []
      summary: List all vendors (STUB, admin)
      tags:
      - Vendors (Admin)
  /admin/vendors/{id}:
    get:
      parameters:
      - description: Vendor ID
        in: path
        name: id
        required: true
