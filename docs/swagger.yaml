  /customer/orders/checkout:
    post:
      consumes:
      - application/json
      description: Should split master order into per-vendor sub-orders, apply commission,
        deduct stock. Currently returns 201 without side-effects.
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_coolmate_ecommerce-backend_internal_utils.APIResponse'
      security:
      - BearerAuth: []
