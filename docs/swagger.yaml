  /health:
    get:
      description: Returns 200 when the API is up and the database accepts a ping.
      produces:
      - application/json
      responses:
        "200":
          description: '{ status: healthy }'
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: '{ status: unhealthy, error: ... }'
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Liveness + DB ping
      tags:
      - Health
  /products:
    get:
      description: Public product catalog with pagination and text search.
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Items per page (max 100, default 10)
        in: query
        name: per_page
        type: integer
      - description: Substring search on name/description
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_coolmate_ecommerce-backend_internal_utils.APIResponse'
      summary: List published products
