        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_coolmate_ecommerce-backend_internal_utils.APIResponse'
      security:
      - BearerAuth: []
      summary: Reject vendor (STUB, admin)
      tags:
      - Vendors (Admin)
  /admin/vendors/{id}/settle:
    post:
      parameters:
      - description: Vendor ID
