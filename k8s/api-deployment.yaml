apiVersion: apps/v1
kind: Deployment
metadata:
  name: coolmate-api
  namespace: coolmate
  labels:
    app: coolmate-api
    version: v1
spec:
  replicas: 3  # Start with 3 for HA
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: coolmate-api
  template:
    metadata:
      labels:
        app: coolmate-api
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      # Pod Disruption Budget for high availability
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - coolmate-api
                topologyKey: kubernetes.io/hostname

      serviceAccountName: coolmate-api

      # Init container for migrations
      initContainers:
        - name: migrate
          image: coolmate/api:latest
          command: ["./api", "migrate"]
          env:
            - name: DB_HOST
              value: "postgres-service"
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: coolmate-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: coolmate-secrets
                  key: DB_PASSWORD
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: coolmate-secrets
                  key: DB_NAME

      containers:
        - name: api
          image: coolmate/api:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP

          # Environment variables
          env:
            # Non-sensitive from ConfigMap
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: coolmate-config
                  key: LOG_LEVEL
            - name: LOG_ENCODING
              valueFrom:
                configMapKeyRef:
                  name: coolmate-config
                  key: LOG_ENCODING
            - name: GIN_MODE
              valueFrom:
                configMapKeyRef:
                  name: coolmate-config
                  key: GIN_MODE

            # Database
            - name: DB_HOST
              value: "postgres-service"
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: coolmate-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: coolmate-secrets
                  key: DB_PASSWORD
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: coolmate-secrets
                  key: DB_NAME
            - name: DB_MAX_OPEN_CONNS
              valueFrom:
                configMapKeyRef:
                  name: coolmate-config
                  key: DB_MAX_OPEN_CONNS
            - name: DB_MAX_IDLE_CONNS
              valueFrom:
                configMapKeyRef:
                  name: coolmate-config
                  key: DB_MAX_IDLE_CONNS

            # Redis
            - name: REDIS_HOST
              value: "redis-service"
            - name: REDIS_PORT
              value: "6379"

            # JWT
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: coolmate-secrets
                  key: JWT_SECRET

            # S3
            - name: S3_ENDPOINT
              value: "https://s3.amazonaws.com"
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: coolmate-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: coolmate-secrets
                  key: AWS_SECRET_ACCESS_KEY

            # Pod metadata
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace

          # Liveness probe
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          # Readiness probe
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2

          # Startup probe (for slow-starting containers)
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 10

          # Resource limits
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          # Security context
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

          # Volume mounts
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /app/cache

      # Volumes
      volumes:
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}

      # Security context for pod
      securityContext:
        fsGroup: 1000

      # Pod termination grace period
      terminationGracePeriodSeconds: 30

      # DNS policy
      dnsPolicy: ClusterFirst

---
apiVersion: v1
kind: Service
metadata:
  name: coolmate-api-service
  namespace: coolmate
  labels:
    app: coolmate-api
spec:
  type: ClusterIP
  selector:
    app: coolmate-api
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: coolmate-api-hpa
  namespace: coolmate
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: coolmate-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: coolmate-api-pdb
  namespace: coolmate
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: coolmate-api

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: coolmate-api
  namespace: coolmate
